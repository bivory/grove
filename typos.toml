# Typos configuration
# https://github.com/crate-ci/typos

[files]
extend-exclude = [
    "target/",
    "*.lock",
    ".git/",
    ".tissue/",
    "design/research/keyword/benchmarks/",
    "design/research/benchmarks/",
]

[default]
extend-ignore-re = [
    # UUIDs
    "[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}",
]

[default.extend-words]
# Add project-specific words that are not typos
grove = "grove"
# Intentional typo used in fuzzy search tests
contaner = "contaner"
# Academic author name (Asai et al., Self-RAG paper)
Asai = "Asai"
# Abbreviation: Named Entity Density
NED = "NED"
neds = "neds"
# French word fragment in UTF-8 truncation test (src/llm.rs)
caf = "caf"
# Abbreviation: False Positive Rate (eval metrics)
fpr = "fpr"
FPR = "FPR"
